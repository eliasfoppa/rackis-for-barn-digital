<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      (function() {
        // 1. Save the requested path (e.g., /about)
        sessionStorage.setItem('gh-pages-path', location.pathname);

        // 2. Save the current scroll position before redirecting
        sessionStorage.setItem('gh-pages-scroll-y', window.scrollY);

        // 3. Redirect to the root of the custom domain (/)
        window.location.replace('/');
      })();
    </script>
</head>
<body>
    If you are not redirected automatically, please wait.
</body>
</html>
